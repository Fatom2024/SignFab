
<!DOCTYPE html>

    <style>
      @media print {
        /* Hide all non-essential UI by default */
        body > #root > div > div:first-child, /* Sidebar */
        body > #root > div > div:last-child > header, /* Header */
        .non-printable {
            display: none !important;
        }

        /* Reset main layout for printing */
        body, main, main > div {
            padding: 0 !important;
            margin: 0 !important;
            overflow: visible !important;
            background-color: #fff;
        }

        /* Ensure the printable content takes full width and is visible */
        .printable-area, .printable-area * {
            visibility: visible;
        }
        .printable-area {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: none !important;
            border: none !important;
        }
        
        /* Improve card appearance for print */
        .printable-card {
            break-inside: avoid;
            page-break-inside: avoid;
            box-shadow: none !important;
            border: 1px solid #e5e7eb; /* Use a light border for printed cards */
        }

        /* Set page properties */
        @page {
            size: A4;
            margin: 20mm;
        }

        body {
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
      }
    </style>
